version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: finuser
      POSTGRES_PASSWORD: finpass
      POSTGRES_DB: finanalytics
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finuser -d finanalytics"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://finuser:finpass@db:5432/finanalytics
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - model_artifacts:/app/models/artifacts

volumes:
  pg_data:
  model_artifacts: